<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Ventas — Atmospheric Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        * 
        { 
            box-sizing: border-box; margin: 0; padding: 0;
        }
        
        body 
        { 
            font-family: 'Inter', sans-serif; 
            background: #fbf9f9; 
            color: #1e293b; 
            padding: 3rem; 
            min-height: 100vh; 
        }

        .header 
        { 
            text-align: center;
            margin-bottom: 4rem; 
            position: relative;
        }
        
        .header h1 
        { 
            color: #005bbf; 
            font-weight: 800; 
            font-style: italic; 
            letter-spacing: -0.02em; 
            font-size: 2rem; 
        }

        .btn-home 
        {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent; 
            color: #94a3b8; 
            border: 1px solid #e2e8f0;
            padding: 10px 20px; 
            border-radius: 999px; 
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        
        .btn-home:hover 
        { 
            color: #005bbf; 
            border-color: #005bbf; 
            background: #ffffff;
        }

        .cards 
        { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2rem; 
            margin-bottom: 4rem; 
        }
        
        .card 
        { 
            background: #ffffff; 
            padding: 2.5rem; 
            border-radius: 2rem; 
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            text-align: center;
        }

        .card .label 
        { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            margin-bottom: 0.8rem; 
        }
        
        .card.vip .label
        { 
            color: #eab308; 
        }   
        .card.pref .label 
        { 
            color: #f97316;
        }  
        .card.gral .label 
        {
            color: #ef4444; 
        }  

        .card .valor 
        { 
            font-size: 2rem; 
            font-weight: 900; 
            color: #1e293b; 
            letter-spacing: -0.03em;
        }

        .container 
        { 
            background: #ffffff; 
            padding: 3rem; 
            border-radius: 2.5rem; 
            border: 1px solid #f1f5f9;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03); 
        }
        
        .container h2 
        { 
            color: #94a3b8; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            margin-bottom: 2.5rem; 
            text-align: center;
        }

        table
        { 
            width: 100%; border-collapse: collapse; 
        }
        
        th 
        { 
            text-align: left; 
            padding: 1rem; 
            color: #94a3b8; 
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 1px solid #f1f5f9;
        }
        
        td 
        { 
            padding: 1.5rem 1rem; 
            border-bottom: 1px solid #f8fafc; 
            font-size: 0.9rem; 
            color: #475569;
        }
        
        .text-vip 
        {
            color: #eab308; font-weight: 800; font-size: 10px; text-transform: uppercase;
        }
        .text-pref
        {
            color: #f97316; font-weight: 800; font-size: 10px; text-transform: uppercase;
        }
        .text-gral 
        { 
            color: #ef4444; font-weight: 800; font-size: 10px; text-transform: uppercase; 
        }

        .ingreso 
        { 
            color: #1e293b; 
            font-weight: 700; 
        }
        
        .total-row td 
        { 
            background: #fcfdfe; 
            font-weight: 900; 
            color: #1e293b; 
            border-top: 2px solid #f1f5f9; 
            padding: 2rem 1rem;
        }
    </style>
</head>
<body onload="inicializar()">

    <div class="header">
        <h1>Reporte de Ventas</h1>
        <button class="btn-home" onclick="irAHome()">← Volver al inicio</button>
    </div>

    <div class="cards">
        <div class="card vip">
            <div class="label">Ingresos VIP</div>
            <div class="valor" id="total-vip">$0.00</div>
        </div>
        <div class="card pref">
            <div class="label">Ingresos Preferencial</div>
            <div class="valor" id="total-pref">$0.00</div>
        </div>
        <div class="card gral">
            <div class="label">Ingresos General</div>
            <div class="valor" id="total-gral">$0.00</div>
        </div>
    </div>

    <div class="container">
        <h2>Historial de transacciones</h2>
        <table>
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Categoría</th>
                    <th>Ingresos</th>
                    <th>Asientos Vendidos</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
            </tbody>
        </table>
    </div>

    <script>
        function inicializar() 
        {
            if (!window.javaApp) 
            { 
              setTimeout(inicializar, 150); return; 
            }

            try 
            {
                const rawData = window.javaApp.getReporteVentasDetallado();
                const ventas = JSON.parse(rawData);
                const tabla = document.getElementById('tablaCuerpo');

                if (!ventas || ventas.length === 0)
                {
                    tabla.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:4rem; color:#94a3b8;">No hay ventas registradas aún.</td></tr>';
                    return;
                }

                let totales = { VIP: 0, PREFERENCIAL: 0, GENERAL: 0 };
                let totalGeneral = 0;

                ventas.forEach(v => 
                {
                    const cat = (v.categoria || '').toUpperCase();
                    if (totales[cat] !== undefined) totales[cat] += v.ingresos;
                    totalGeneral += v.ingresos;
                });

                document.getElementById('total-vip').textContent = '$' + totales.VIP.toFixed(2);
                document.getElementById('total-pref').textContent = '$' + totales.PREFERENCIAL.toFixed(2);
                document.getElementById('total-gral').textContent = '$' + totales.GENERAL.toFixed(2);

                tabla.innerHTML = ventas.map(v => 
                {
                    const cat = (v.categoria || '').toUpperCase();
                    const colorClass = cat === 'VIP' ? 'text-vip' : cat === 'PREFERENCIAL' ? 'text-pref' : 'text-gral';
                    const label = cat === 'VIP' ? 'VIP' : cat === 'PREFERENCIAL' ? 'Preferencial' : 'General';
                    
                    return `
                    <tr>
                        <td style="font-size: 0.8rem; color: #94a3b8;">${v.fecha || '—'}</td>
                        <td class="${colorClass}">${label}</td>
                        <td class="ingreso">$${parseFloat(v.ingresos).toFixed(2)}</td>
                        <td style="color: #cbd5e1; font-size: 0.75rem;">${v.detalles || 'Sin detalles'}</td>
                    </tr>`;
                }).join('') + `
                    <tr class="total-row">
                        <td colspan="2" style="font-size: 11px; letter-spacing: 0.1em;">Balance Final del Sistema</td>
                        <td class="ingreso" style="color: #005bbf; font-size: 1.2rem;">$${totalGeneral.toFixed(2)}</td>
                        <td></td>
                    </tr>`;

            } catch (err) 
            {
                console.error(err);
            }
        }

        function irAHome()
        {
            if (window.javaApp) window.javaApp.navegarAHome();
        }
    </script>
</body>
</html>
