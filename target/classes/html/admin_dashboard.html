<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración — Atmospheric Arena</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 2rem; min-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { color: #3b82f6; font-size: 1.8rem; }
        .btn-home {
            background: #1e293b; color: #94a3b8; border: 1px solid #334155;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-size: 0.9rem; transition: all 0.2s;
        }
        .btn-home:hover { background: #334155; color: white; }

        /* Tarjetas resumen */
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; border-left: 4px solid; }
        .card.vip   { border-color: #7c3aed; }
        .card.pref  { border-color: #2563eb; }
        .card.gral  { border-color: #16a34a; }
        .card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 0.5rem; }
        .card .valor { font-size: 2rem; font-weight: 900; }
        .card.vip  .valor { color: #a78bfa; }
        .card.pref .valor { color: #60a5fa; }
        .card.gral .valor { color: #4ade80; }

        /* Tabla */
        .container { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .container h2 { color: #94a3b8; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #334155; color: #94a3b8; text-align: left; padding: 12px 16px; border-bottom: 2px solid #3b82f6; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 12px 16px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
        tr:hover td { background: #263548; }

        .chip {
            display: inline-block;
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .chip-vip  { background: #4c1d95; color: #c4b5fd; }
        .chip-pref { background: #1e3a8a; color: #93c5fd; }
        .chip-gral { background: #14532d; color: #86efac; }

        .ingreso { color: #4ade80; font-weight: 700; font-size: 1rem; }
        .detalle { color: #64748b; font-size: 0.8rem; }
        .vacio   { text-align: center; padding: 3rem; color: #475569; }

        .total-row td { background: #0f172a; font-weight: 700; color: #f1f5f9; border-top: 2px solid #3b82f6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Reporte de Ventas</h1>
        <button class="btn-home" onclick="irAHome()">← Volver al inicio</button>
    </div>

    <!-- Tarjetas resumen por zona -->
    <div class="cards">
        <div class="card vip">
            <div class="label">💜 VIP — Ingresos</div>
            <div class="valor" id="total-vip">$0</div>
        </div>
        <div class="card pref">
            <div class="label">💙 Preferencial — Ingresos</div>
            <div class="valor" id="total-pref">$0</div>
        </div>
        <div class="card gral">
            <div class="label">💚 General — Ingresos</div>
            <div class="valor" id="total-gral">$0</div>
        </div>
    </div>

    <div class="container">
        <h2>Historial de transacciones</h2>
        <table>
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Categoría</th>
                    <th>Ingresos</th>
                    <th>Asientos Vendidos</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="4" class="vacio">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function inicializar() {
            if (!window.javaApp) { setTimeout(inicializar, 150); return; }

            try {
                const rawData = window.javaApp.getReporteVentasDetallado();
                const ventas  = JSON.parse(rawData);
                const tabla   = document.getElementById('tablaCuerpo');

                if (!ventas || ventas.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4" class="vacio">No hay ventas registradas aún.</td></tr>';
                    return;
                }

                // Acumular totales por zona
                let totales = { VIP: 0, PREFERENCIAL: 0, GENERAL: 0 };
                let totalGeneral = 0;

                ventas.forEach(v => {
                    const cat = (v.categoria || '').toUpperCase();
                    if (totales[cat] !== undefined) totales[cat] += v.ingresos;
                    totalGeneral += v.ingresos;
                });

                // Actualizar tarjetas
                document.getElementById('total-vip').textContent  = '$' + totales.VIP.toFixed(2);
                document.getElementById('total-pref').textContent = '$' + totales.PREFERENCIAL.toFixed(2);
                document.getElementById('total-gral').textContent = '$' + totales.GENERAL.toFixed(2);

                // Renderizar filas
                tabla.innerHTML = ventas.map(v => {
                    const cat    = (v.categoria || '').toUpperCase();
                    const chip   = cat === 'VIP' ? 'chip-vip' : cat === 'PREFERENCIAL' ? 'chip-pref' : 'chip-gral';
                    const label  = cat === 'VIP' ? 'VIP' : cat === 'PREFERENCIAL' ? 'Preferencial' : 'General';
                    return `
                    <tr>
                        <td>${v.fecha || '—'}</td>
                        <td><span class="chip ${chip}">${label}</span></td>
                        <td class="ingreso">$${parseFloat(v.ingresos).toFixed(2)}</td>
                        <td class="detalle">${v.detalles || '—'}</td>
                    </tr>`;
                }).join('') + `
                    <tr class="total-row">
                        <td colspan="2">TOTAL GENERAL</td>
                        <td class="ingreso">$${totalGeneral.toFixed(2)}</td>
                        <td></td>
                    </tr>`;

            } catch (err) {
                document.getElementById('tablaCuerpo').innerHTML =
                    '<tr><td colspan="4" class="vacio">Error al cargar datos: ' + err.message + '</td></tr>';
            }
        }

        function irAHome() {
            if (window.javaApp) window.javaApp.navegarAHome();
        }
    </script>
</body>
</html>
